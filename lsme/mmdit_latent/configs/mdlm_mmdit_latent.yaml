# File: configs/mdlm_mmdit_latent.yaml
# MMDiT variant: latent conditioning via joint attention (second modality)
defaults:
  - logging: default
  - data: owt
  - model: small
  - optimizer: adam
  - _self_

# Data configuration
data:
  dataset_name: "json"  # Use json dataset
  data_files:
    train: "${data.latent_data_root}/train_data.json"
    validation: "${data.latent_data_root}/validation_data.json"
  latent_data_root: "/inspire/hdd/global_user/zhangjiaquan-253108540222/latent/HDLM/mmdit/data_root"
  streaming: false
  pre_tokenize: true
  max_length: 512
  sequence_packing: false  # Disable for latent conditioning

# Model with MMDiT latent conditioning
model:
  type: diffusion
  diffusion_process: mdlm
  use_latent_conditioning: true
  conditioning_type: "mmdit"  # MMDiT joint attention conditioning
  latent_dim: 768  # T5 latent dimension
  latent_hidden_size: 768  # Hidden dim for latent modality in MMDiT
  cluster_size: 0
  qk_rmsnorm: false
  max_latent_len: 1  # Number of latent tokens

  # Transformer parameters
  hidden_size: 768
  n_blocks: 12
  n_heads: 12
  cond_dim: 768
  max_seq_len: 512
  dropout: 0.1
  t_eps: 1e-4

# Training
training:
  resume: null
  seed: 1
  train_batch_size: 32
  eval_batch_size: 32
  num_train_steps: 1000000
  lr_schedule: cosine
  warmup_steps: 5000
  low_discrepancy_sampling: true
  dtype: bf16
  compile_model: true

loss:
  loss_type: mdlm
  loss_scale: 1.0
  reduction: tokenmean
