# File: configs/mdlm_mmdit_latent_512.yaml
# MMDiT variant with max_seq_len=512 for faster training on shorter text
# Use this for quick experiments or when generating short text (reviews, captions)
defaults:
  - logging: default
  - data: owt
  - model: small
  - optimizer: adam
  - _self_

# Data configuration
data:
  dataset_name: "json"
  data_files:
    train: "${data.latent_data_root}/train_data.jsonl"
    validation: "${data.latent_data_root}/validation_data.jsonl"
  latent_data_root: "/inspire/hdd/project/future-reading/zhangjiaquan-253108540222/jiaquan/latent/DLM-mmdit/mmdit_latent/data"
  streaming: false
  pre_tokenize: true
  max_length: 512
  sequence_packing: false

model:
  type: diffusion
  diffusion_process: mdlm
  use_latent_conditioning: true
  conditioning_type: "mmdit"
  latent_dim: 32
  latent_hidden_size: 768
  cluster_size: 0
  qk_rmsnorm: false
  max_latent_len: 1

  hidden_size: 768
  n_blocks: 12
  n_heads: 12
  cond_dim: 768
  max_seq_len: 512
  dropout: 0.1
  t_eps: 1e-4

training:
  resume: null
  seed: 1
  train_batch_size: 32
  eval_batch_size: 32
  num_train_steps: 1000000
  lr_schedule: cosine
  warmup_steps: 5000
  low_discrepancy_sampling: true
  dtype: bf16
  compile_model: true

loss:
  loss_type: mdlm
  loss_scale: 1.0
  reduction: tokenmean
