# File: configs/mdlm_mmdit_latent.yaml
# MMDiT variant: latent conditioning via joint attention (second modality)
# Train with max_seq_len=4096 to support generating any length <= 4096
defaults:
  - logging: default
  - data: owt
  - model: small
  - optimizer: adam
  - _self_

# Data configuration
data:
  dataset_name: "json"  # Use json dataset
  data_files:
    train: "${data.latent_data_root}/train_data.jsonl"
    validation: "${data.latent_data_root}/validation_data.jsonl"
  latent_data_root: "/inspire/hdd/project/future-reading/zhangjiaquan-253108540222/jiaquan/latent/DLM-mmdit/mmdit_latent/data"
  streaming: false
  pre_tokenize: true
  max_length: 4096
  sequence_packing: false  # Disable for latent conditioning

# Model with MMDiT latent conditioning
model:
  type: diffusion
  diffusion_process: mdlm
  use_latent_conditioning: true
  conditioning_type: "mmdit"  # MMDiT joint attention conditioning
  latent_dim: 32  # Qwen3-Embedding-8B with dim=32
  latent_hidden_size: ${model.hidden_size}  # Match model hidden dim
  cluster_size: 0
  qk_rmsnorm: false
  max_latent_len: 1  # Number of latent tokens
  max_seq_len: 4096
  t_eps: 1e-4

# Training
training:
  resume: null
  seed: 1
  train_batch_size: 4  # Smaller batch for 4096 seq len (adjust per GPU memory)
  eval_batch_size: 4
  num_train_steps: 1000000
  lr_schedule: cosine
  warmup_steps: 5000
  low_discrepancy_sampling: true
  dtype: bf16
  compile_model: true

loss:
  loss_type: mdlm
  loss_scale: 1.0
  reduction: tokenmean
